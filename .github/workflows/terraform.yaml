name: Terraform CI (Plan + Apply QA, Stage & Prod)

on:
  push:
    branches: [ branch-name ]
  pull_request:
    branches: [ branch-name ]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v2

      # -------------------------------
      # Detect environment
      # -------------------------------
      - name: Detect environment
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi

          CHANGED=$(git diff --name-only $BASE ${{ github.sha }})

          ENVS=$(echo "$CHANGED" | grep -oE 'envs/(qa|stage|prod)' | sort -u)
          COUNT=$(echo "$ENVS" | wc -l)

          if [[ "$COUNT" -eq 0 ]]; then
            echo "No environment changes detected"
            exit 0
          fi

          if [[ "$COUNT" -gt 1 ]]; then
            echo "ERROR: Multiple environments modified"
            exit 1
          fi

          ENV=$(echo "$ENVS" | cut -d'/' -f2)
          echo "env=$ENV" >> $GITHUB_OUTPUT

      # -------------------------------
      # Set Terraform variables
      # -------------------------------
      - name: Set Terraform variables
        if: steps.detect.outputs.env != ''
        run: |
          case "${{ steps.detect.outputs.env }}" in
            qa)
              echo "TF_DIR=gcp/terraform-files/envs/qa" >> $GITHUB_ENV
              echo "TFVARS=qa.tfvars" >> $GITHUB_ENV
              echo "GCP_SECRET=GCP_SA_KEY_QA" >> $GITHUB_ENV
              ;;
            stage)
              echo "TF_DIR=gcp/terraform-files/envs/stage" >> $GITHUB_ENV
              echo "TFVARS=stage.tfvars" >> $GITHUB_ENV
              echo "GCP_SECRET=GCP_SA_KEY_QA" >> $GITHUB_ENV
              ;;
            prod)
              echo "TF_DIR=gcp/terraform-files/envs/prod" >> $GITHUB_ENV
              echo "TFVARS=prod.tfvars" >> $GITHUB_ENV
              echo "GCP_SECRET=GCP_SA_KEY_PROD" >> $GITHUB_ENV
              ;;
          esac

      - name: Terraform Init
        if: steps.detect.outputs.env != ''
        working-directory: ${{ env.TF_DIR }}
        run: terraform init
        env:
          GOOGLE_CREDENTIALS: ${{ secrets[env.GCP_SECRET] }}

      - name: Terraform Plan
        if: steps.detect.outputs.env != ''
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -input=false -var-file="${{ env.TFVARS }}"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets[env.GCP_SECRET] }}

      # -------------------------------
      # Terraform Apply (QA, Stage & Prod)
      # -------------------------------
      - name: Terraform Apply (QA, Stage & Prod)
        if: |
          github.event_name == 'push' &&
          steps.detect.outputs.env != ''
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -input=false -var-file="${{ env.TFVARS }}"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets[env.GCP_SECRET] }}
